name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "mkdocs.yml"
      - "docs/**"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv and dependencies
        # Use the setup-uv action to install uv and cache it
        uses: astral-sh/setup-uv@v1
        with:
          uv-version: 0.11.x # Use the latest version or pin to a specific one
          # Optional: cache the uv package cache
          cache-key-prefix: "v1-uv-cache"

      - name: Install MkDocs and dependencies
        run: |
          uv sync --python 3.13 --all-groups

      - name: Build site
        run: uv run mkdocs build --site-dir site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
