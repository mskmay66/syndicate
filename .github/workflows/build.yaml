name: Build Syndicate
on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv and dependencies
        # Use the setup-uv action to install uv and cache it
        uses: astral-sh/setup-uv@v8.0.0
        with:
          uv-version: 0.11.x

      - name: Create a virtual environment and sync dependencies
        run: |
          uv sync --python 3.13

      - name: Build Package Artifacts
        run: uv build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/*
