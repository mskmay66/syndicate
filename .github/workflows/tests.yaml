name: CI Tests

on:
  push:
    branches: [ main ]
    paths:
      - src/**
      - tests/**
  pull_request:
    branches: [ main ]
    paths:
      - src/**'
      - tests/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      # Use an existing action to set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv and dependencies
      # Use the setup-uv action to install uv and cache it
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        uv-version: 0.1.x # Use the latest version or pin to a specific one
        # Optional: cache the uv package cache
        cache-key-prefix: "v1-uv-cache"

    - name: Create a virtual environment and sync dependencies
      run: |
        uv sync --python ${{ matrix.python-version }}

    - name: Install test dependencies (e.g., pytest, ruff)
      run: |
        # Use uv add (or uv pip install) to add development/test tools
        uv add pytest pytest-cov ruff --python ${{ matrix.python-version }}

    - name: Run tests with pytest
      run: |
        # Run your tests using the installed tools
        uv run --python ${{ matrix.python-version }} pytest --cov=your_package --cov-report=xml tests/ --junitxml=test-results.xml
